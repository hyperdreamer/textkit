# Server bind address. Defaults to "127.0.0.1" when omitted.
# Use "0.0.0.0" only on a trusted network; the backend exposes local AI APIs.
host: "127.0.0.1"

# Server port. Defaults to 8765 when omitted.
port: 8765

# Basic request limits to avoid unbounded memory use and accidental large
# provider calls.
max_upload_bytes: 15728640
max_image_pixels: 40000000
max_text_chars: 200000
max_prompt_chars: 20000
max_request_body_bytes: 2097152

# In-process abuse controls for AI calls and prompt updates. For multi-worker
# deployments, put an equivalent shared limiter at the reverse proxy as well.
requests_per_minute: 60
max_concurrent_requests: 4

# Chrome-extension origins must either appear in this exact allowlist or send
# X-TextKit-Token with this shared secret. Environment references are resolved
# lazily, so the server can still start before the secret is provisioned.
extension_token: "$TEXTKIT_EXTENSION_TOKEN"
# allowed_extension_ids: ["abcdefghijklmnopqrstuvwxyzabcdef"]

# Required for PUT /prompts/{name}; send as X-TextKit-Admin-Token or Bearer.
# Prompt administration remains disabled if this secret is unavailable.
admin_token: "$TEXTKIT_ADMIN_TOKEN"

# Enable debug logging to stderr for OCR / dedup / translate requests.
# debug: false

# AI API settings — uses an OpenAI-compatible chat completions API.
ai:
  # Base URL for the provider API, without a trailing slash.
  # OpenAI-compatible providers must expose /v1/chat/completions.
  api_base: "https://api.openai.com"

  # API key for the provider. Plaintext values are used directly.
  # Prefix with ``$`` to treat the value as an environment variable name
  # (e.g. ``$OCR_API_KEY`` resolves ``os.getenv("OCR_API_KEY")``).
  # Alternatively set ``api_key_env`` to the name of an environment variable.
  # The backend also falls back to OCR_API_KEY and provider-specific defaults.
  # Examples: $OCR_API_KEY, $OPENAI_API_KEY.
  api_key: "$OCR_API_KEY"

  # Vision-capable model name to use when no per-task override specifies one.
  model: "gpt-4.1-mini"

  # Per-task model/API overrides (optional).  Every field is optional — empty
  # fields inherit from the parent ``ai`` section.  You can override the model
  # or API endpoint for a specific task.
  #
  # ocr:                    # OCR-specific overrides
  #   model: "gpt-4.1"      # vision-capable model for OCR
  #
  # text:                   # text-processing overrides (dedup + translate)
  #   api_base: "https://other-proxy.example.com"
  #   api_key: "$OTHER_PROXY_API_KEY"
  #   model: "claude-sonnet-4-20250514"

  # Non-loopback providers must use HTTPS. Plain HTTP is accepted only for
  # localhost, 127.0.0.1, and ::1 development providers.
  # Per-phase HTTP timeouts for AI API calls (all in seconds).
  # Omit any key to use its default.  Increase ``read`` when translating
  # very long text that may take the model several minutes to process.
  # timeout:
  #   connect: 10    # TCP/TLS handshake (default: 10)
  #   read: 600      # waiting for response body (default: 600 = 10 min)
  #   write: 60      # sending the request body (default: 60)
  #   pool: 10       # acquiring a connection from the pool (default: 10)
