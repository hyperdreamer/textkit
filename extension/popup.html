<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TextKit</title>
    <style>
      body {
        width: 360px;
        margin: 0;
        color: #1f2937;
        background: #f8fafc;
        font: 13px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .tab-bar {
        display: flex;
        border-bottom: 2px solid #e2e8f0;
        padding: 0 14px;
        background: #fff;
      }

      .tab {
        padding: 8px 16px;
        color: #94a3b8;
        font-size: 13px;
        font-weight: 600;
        border: none;
        border-bottom: 2px solid transparent;
        background: none;
        cursor: pointer;
        margin-bottom: -2px;
      }

      .tab.active {
        color: #2563eb;
        border-bottom-color: #2563eb;
      }

      main {
        padding: 14px;
      }

      h1 {
        margin: 0 0 12px;
        color: #111827;
        font-size: 16px;
        font-weight: 650;
      }

      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 10px;
      }

      .stat {
        min-height: 36px;
        padding: 5px 8px;
        border: 1px solid #dbe3ef;
        border-radius: 8px;
        background: #fff;
      }

      .label {
        display: block;
        margin-bottom: 3px;
        color: #64748b;
        font-size: 11px;
        text-transform: uppercase;
      }

      .value {
        color: #111827;
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      #progress {
        min-height: 20px;
        margin: 8px 0 12px;
        color: #334155;
      }

      .settings {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }

      .settings label {
        flex: 1;
        color: #64748b;
        font-size: 11px;
        text-transform: uppercase;
      }

      .settings input,
      .settings select {
        box-sizing: border-box;
        width: 100%;
        margin-top: 2px;
        padding: 5px 7px;
        border: 1px solid #cbd5e1;
        border-radius: 5px;
        color: #111827;
        font-size: 12px;
      }

      textarea {
        box-sizing: border-box;
        width: 100%;
        min-height: 220px;
        resize: vertical;
        padding: 10px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        color: #111827;
        background: #fff;
        font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      button {
        flex: 1;
        height: 34px;
        border: 1px solid #2563eb;
        border-radius: 7px;
        color: #fff;
        background: #2563eb;
        font: inherit;
        cursor: pointer;
      }

      button.secondary {
        border-color: #cbd5e1;
        color: #1f2937;
        background: #fff;
        font-size: 11px;
      }

      button:disabled {
        border-color: #cbd5e1;
        color: #94a3b8;
        background: #e2e8f0;
        cursor: default;
      }

      button.danger {
        border-color: #dc2626;
        background: #dc2626;
      }

      .hidden {
        display: none;
      }

      #last-region {
        margin-top: 8px;
        color: #64748b;
        font-size: 11px;
        text-align: center;
      }

      .option-row {
        display: flex;
        gap: 16px;
        margin-bottom: 10px;
      }

      .option-row label {
        color: #334155;
        font-size: 12px;
        cursor: pointer;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="tab-bar">
      <button class="tab active" data-panel="ocr-panel">OCR</button>
      <button class="tab" data-panel="translation-panel">Translation</button>
      <button class="tab" data-panel="format-panel">Format</button>
      <button class="tab" data-panel="translate-panel">Prompt</button>
    </div>

    <!-- OCR Panel -->
    <main id="ocr-panel">
      <h1>TextKit</h1>
      <section class="stats" aria-label="Capture status">
        <div class="stat"><span class="label">Status</span><span id="status" class="value">Idle</span></div>
        <div class="stat"><span class="label">Current page</span><span id="current-page" class="value">0</span></div>
        <div class="stat"><span class="label">Fragments</span><span id="fragments" class="value">0</span></div>
        <div class="stat"><span class="label">Progress</span><span id="short-progress" class="value">Ready</span></div>
      </section>
      <div id="progress">Ready</div>
      <div class="settings">
        <label>Host <input id="ocr-host" type="text" placeholder="localhost"></label>
        <label>Port <input id="ocr-port" type="number" placeholder="8765"></label>
      </div>
      <div class="option-row">
        <label><input id="ocr-autoscroll" type="checkbox" checked> Auto-scroll</label>
      </div>
      <textarea id="result" placeholder="Merged OCR text will appear here."></textarea>
      <div class="actions">
        <button id="start" type="button" class="secondary">Select Region</button>
        <button id="stop" type="button" class="danger hidden">Stop</button>
        <button id="retry" type="button" class="hidden">Retry</button>
        <button id="copy" type="button" disabled>Copy</button>
        <button id="download" type="button" disabled>Download</button>
      </div>
      <div id="last-region"></div>
    </main>

    <!-- Translate Panel -->
    <main id="translate-panel" class="hidden">
      <h1>Translation Prompt</h1>
      <div class="settings">
        <label>Language
          <select id="tl-language">
            <option value="original">Original</option>
            <option value="Chinese">Chinese</option>
            <option value="English">English</option>
            <option value="Japanese">Japanese</option>
            <option value="Korean">Korean</option>
            <option value="French">French</option>
            <option value="German">German</option>
            <option value="Spanish">Spanish</option>
          </select>
        </label>
      </div>
      <textarea id="translate-prompt" placeholder="Custom AI prompt (per language). E.g.: Translate to formal academic Chinese." style="min-height:200px"></textarea>
      <h1>Format Prompt</h1>
      <textarea id="format-prompt" placeholder="Custom formatting prompt. E.g.: Reformat this text as clean Markdown with headings and bullet points." style="min-height:100px;margin-top:8px"></textarea>
    </main>

    <!-- Translation Panel -->
    <main id="translation-panel" class="hidden">
      <h1>Translation</h1>
      <div class="settings">
        <label>Language
          <select id="tl2-language">
            <option value="original">Original</option>
            <option value="Chinese">Chinese</option>
            <option value="English">English</option>
            <option value="Japanese">Japanese</option>
            <option value="Korean">Korean</option>
            <option value="French">French</option>
            <option value="German">German</option>
            <option value="Spanish">Spanish</option>
          </select>
        </label>
      </div>
      <div id="tl2-status" class="stat" style="margin-bottom:8px">
        <span class="label">Status</span>
        <span id="tl2-status-text" class="value">Ready</span>
      </div>
      <textarea id="tl2-result" readonly placeholder="Translation will appear here."></textarea>
      <div class="option-row" style="margin-top:8px">
        <label><input id="tl2-autocopy" type="checkbox"> Auto-copy</label>
        <label><input id="tl2-autosave" type="checkbox"> Auto-save</label>
        <label><input id="tl2-autotranslate" type="checkbox"> Auto-translate</label>
      </div>
      <div id="tl2-autosave-path-row" class="hidden" style="margin-bottom:8px">
        <label style="color:#64748b;font-size:11px;text-transform:uppercase">Save path
          <input id="tl2-autosave-path" type="text" placeholder="e.g. ocr/translation.txt" list="tl2-path-suggestions" style="box-sizing:border-box;width:100%;margin-top:2px;padding:5px 7px;border:1px solid #cbd5e1;border-radius:5px;font-size:12px">
          <datalist id="tl2-path-suggestions"></datalist>
        </label>
      </div>
      <div class="actions">
        <button id="tl2-translate" type="button" disabled>Translate</button>
        <button id="tl2-copy" type="button" disabled>Copy</button>
        <button id="tl2-save" type="button" disabled>Save</button>
        <button id="tl2-download" type="button" disabled>Download</button>
      </div>
    </main>

    <!-- Format Panel -->
    <main id="format-panel" class="hidden">
      <h1>Format</h1>
      <div id="fmt-status" class="stat" style="margin-bottom:8px">
        <span class="label">Status</span>
        <span id="fmt-status-text" class="value">Ready</span>
      </div>
      <textarea id="fmt-result" readonly placeholder="Formatted text will appear here."></textarea>
      <div id="fmt-save-path-row" style="margin-bottom:8px">
        <label style="color:#64748b;font-size:11px;text-transform:uppercase">Save path
          <input id="fmt-save-path" type="text" placeholder="e.g. ocr/formatted.md" style="box-sizing:border-box;width:100%;margin-top:2px;padding:5px 7px;border:1px solid #cbd5e1;border-radius:5px;font-size:12px">
        </label>
      </div>
      <div class="actions">
        <button id="fmt-format" type="button" disabled>Format</button>
        <button id="fmt-copy" type="button" disabled>Copy</button>
        <button id="fmt-save" type="button" disabled>Save</button>
        <button id="fmt-download" type="button" disabled>Download</button>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
